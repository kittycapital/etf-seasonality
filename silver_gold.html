<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:#000; color:#e8e8f0; }

<script>
const SHARE_URL = 'https://herdvibe.com/116';
let SLV = [], GLD = [];
let asset = 'SLV', win = 504;
let chartP = null, chartZ = null;
let pkLabels = [];
let syncing = false; // 무한 루프 방지

// ── CSV (헤더 대소문자/변형 자동 감지)
function loadCSV(url) {
  return new Promise((res, rej) => {
    Papa.parse(url, {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => {
        if (!r.data.length) { console.warn('[CSV] 비어있음:', url); return res([]); }
        // 헤더 자동 감지 (Date/date, Close/close/Adj Close 등)
        const sample = r.data[0];
        const keys = Object.keys(sample);
        const dateKey = keys.find(k => /^date$/i.test(k.trim()));
        const closeKey = keys.find(k => /^(close|adj\.?\s*close)$/i.test(k.trim()));
        console.log(`[CSV] ${url} → ${r.data.length}행, 헤더: [${keys.join(', ')}], dateKey=${dateKey}, closeKey=${closeKey}`);
        if (!dateKey || !closeKey) {
          console.error(`[CSV] 헤더 매칭 실패! Date/Close 컬럼을 찾을 수 없음. 헤더: ${keys.join(', ')}`);
          return res([]);
        }
        // 표준화: { Date, Close } 형태로 통일
        const data = r.data
          .filter(d => d[dateKey] && d[closeKey] != null)
          .map(d => ({ Date: String(d[dateKey]).trim(), Close: +d[closeKey] }));
        console.log(`[CSV] ${url} → 유효 행: ${data.length}, 기간: ${data[0]?.Date} ~ ${data[data.length-1]?.Date}`);
        res(data);
      },
      error: e => { console.error('[CSV] 로드 실패:', url, e); rej(e); }
    });
  });
}

// ── Z-Score
function calcZ(slv, gld, w) {
  const gMap = {};
  gld.forEach(d => gMap[d.Date] = d.Close);
  const m = slv.filter(d => gMap[d.Date]).map(d => ({ date: d.Date, ratio: d.Close / gMap[d.Date] }));
  console.log(`[Z] SLV=${slv.length}, GLD=${gld.length}, 날짜매칭=${m.length}, window=${w}`);
  if (m.length < w) {
    console.warn(`[Z] 매칭 데이터(${m.length})가 window(${w})보다 적음! Z-Score 계산 불가`);
    // 날짜 형식 비교 (디버그)
    if (slv.length && gld.length) {
      console.warn(`[Z] SLV 날짜 샘플: "${slv[0].Date}", "${slv[slv.length-1].Date}"`);
      console.warn(`[Z] GLD 날짜 샘플: "${gld[0].Date}", "${gld[gld.length-1].Date}"`);
    }
  }
  const result = [];
  for (let i = w - 1; i < m.length; i++) {
    const slice = m.slice(i - w + 1, i + 1).map(x => x.ratio);
    const mean = slice.reduce((a,b)=>a+b,0)/w;
    const std  = Math.sqrt(slice.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/w);
    result.push({ date: m[i].date, ratio: m[i].ratio, z: std>0?(m[i].ratio-mean)/std:0 });
  }
  console.log(`[Z] 결과: ${result.length}행, 기간: ${result[0]?.date} ~ ${result[result.length-1]?.date}`);
  return result;
}

// ── 피크
function findPeaks(data, n=5) {
  const gap = Math.max(10, Math.floor(data.length/25));
  const hi=[], lo=[];
  for (let i=gap; i<data.length-gap; i++) {
    const z=data[i].z;
    const L=data.slice(Math.max(0,i-gap),i).map(d=>d.z);
    const R=data.slice(i+1,Math.min(data.length,i+gap+1)).map(d=>d.z);
    if (z>Math.max(...L)&&z>Math.max(...R)) hi.push({i,z});
    if (z<Math.min(...L)&&z<Math.min(...R)) lo.push({i,z});
  }
  hi.sort((a,b)=>b.z-a.z); lo.sort((a,b)=>a.z-b.z);
  return [...hi.slice(0,n).map(p=>({...p,t:'hi'})),...lo.slice(0,n).map(p=>({...p,t:'lo'}))];
}

// ── 차트 초기 생성
function initCharts() {
  const peakPlugin = {
    id:'pk',
    afterDatasetsDraw(chart) {
      if (!pkLabels.length) return;
      const {ctx,scales:{x,y}} = chart;
      ctx.save();
      pkLabels.forEach(({i,z,t}) => {
        try {
          const isPk = t==='hi';
          ctx.font = 'bold 10px "JetBrains Mono",monospace';
          ctx.fillStyle = isPk?'#f97316':'#2dd4bf';
          ctx.textAlign = 'center';
          ctx.textBaseline = isPk?'bottom':'top';
          ctx.fillText(`${isPk?'▲':'▼'} ${z>=0?'+':''}${z.toFixed(1)}σ`,
            x.getPixelForIndex(i), y.getPixelForValue(z)+(isPk?-4:4));
        } catch(e) {}
      });
      ctx.restore();
    }
  };
  const refPlugin = {
    id:'ref',
    afterDraw(chart) {
      const {ctx,scales:{y},chartArea:{left,right}} = chart;
      ctx.save();
      [[2,'rgba(249,115,22,.4)'],[-2,'rgba(45,212,191,.4)'],[0,'rgba(136,136,136,.25)']].forEach(([v,col]) => {
        const py = y.getPixelForValue(v);
        ctx.beginPath(); ctx.strokeStyle=col; ctx.lineWidth=1;
        ctx.setLineDash(v===0?[]:[5,4]);
        ctx.moveTo(left,py); ctx.lineTo(right,py); ctx.stroke(); ctx.setLineDash([]);
        if (v!==0) {
          ctx.font='9px "JetBrains Mono",monospace'; ctx.fillStyle=col;
          ctx.textAlign='left'; ctx.textBaseline=v>0?'bottom':'top';
          ctx.fillText(`${v>0?'+':''}${v}σ`, left+3, py);
        }
      });
      ctx.restore();
    }
  };

  const zoomOpts = {
    zoom: {
      wheel: { enabled: true, speed: 0.08 },
      pinch: { enabled: true },
      drag: { enabled: true, backgroundColor: 'rgba(100,100,100,0.1)', borderColor: 'rgba(100,100,100,0.5)', borderWidth: 1 },
      mode: 'x',
      onZoom: syncZoom
    },
    pan: { enabled: true, mode: 'x', onPan: syncZoom }
  };

  const commonOpts = (fmtY) => ({
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: {display:false},
      tooltip: { mode:'index', intersect:false, backgroundColor:'#18181b', titleColor:'#666', bodyColor:'#e8e8f0', borderColor:'#333', borderWidth:1, titleFont:{family:'JetBrains Mono'}, bodyFont:{family:'JetBrains Mono'} },
      zoom: zoomOpts
    },
    scales: {
      x: { grid:{color:'#111'}, ticks:{color:'#444',font:{family:'JetBrains Mono',size:9},maxRotation:0,maxTicksLimit:8} },
      y: { position:'right', grid:{color:'#111'}, ticks:{color:'#444',font:{family:'JetBrains Mono',size:9},callback:fmtY} }
    },
    interaction: {mode:'index',intersect:false}
  });

  chartP = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { labels:[], datasets:[{data:[],borderColor:'#c0c0c0',borderWidth:1.5,pointRadius:0,tension:0,fill:false}] },
    options: commonOpts(v=>`$${v.toFixed(v>=100?0:2)}`)
  });

  chartZ = new Chart(document.getElementById('zscoreChart'), {
    type: 'bar',
    data: { labels:[], datasets:[{data:[],backgroundColor:[],borderColor:[],borderWidth:1,barPercentage:1,categoryPercentage:1}] },
    options: {
      ...commonOpts(v=>`${v>=0?'+':''}${v.toFixed(1)}σ`),
      plugins: {
        legend:{display:false},
        tooltip:{ mode:'index',intersect:false,backgroundColor:'#18181b',titleColor:'#666',bodyColor:'#e8e8f0',borderColor:'#333',borderWidth:1,titleFont:{family:'JetBrains Mono'},bodyFont:{family:'JetBrains Mono'} },
        zoom: zoomOpts,
        pk:{}, ref:{}
      }
    },
    plugins: [peakPlugin, refPlugin]
  });
}

// ── 줌 연동 (두 차트 x축 동기화)
function syncZoom(ctx) {
  if (syncing) return;
  syncing = true;
  const src = ctx.chart;
  const dst = src === chartP ? chartZ : chartP;
  if (!dst) { syncing=false; return; }
  const {min, max} = src.scales.x;
  dst.zoomScale('x', {min, max}, 'none');
  syncing = false;
}

function zoomIn()  { chartP?.zoom(1.3); chartZ?.zoom(1.3); }
function zoomOut() { chartP?.zoom(0.77); chartZ?.zoom(0.77); }
function resetZoom() { chartP?.resetZoom(); chartZ?.resetZoom(); }

// ── 데이터 업데이트
function update() {
  const zData = calcZ(SLV, GLD, win);
  if (!zData.length) { console.warn('[update] Z-Score 데이터 없음 — 차트 업데이트 건너뜀'); return; }
  if (asset==='GLD') zData.forEach(d=>d.z=-d.z);

  const zDates = new Set(zData.map(d=>d.date));
  const pSrc   = (asset==='SLV'?SLV:GLD).filter(d=>zDates.has(d.Date));
  if (pSrc.length < 2) { console.warn('[update] 가격 데이터 부족:', pSrc.length); return; }
  const last   = pSrc[pSrc.length-1], prev=pSrc[pSrc.length-2];
  const lastZ  = zData[zData.length-1];
  console.log(`[update] asset=${asset}, pSrc=${pSrc.length}, zData=${zData.length}, last=${last.Date}`);

  // 정보 바
  const dc=last.Close-prev.Close, dp=dc/prev.Close*100;
  document.getElementById('iPrice').textContent = `$${last.Close.toFixed(2)}`;
  const chEl=document.getElementById('iChange');
  chEl.textContent=`${dc>=0?'+':''}${dc.toFixed(2)} (${dp>=0?'+':''}${dp.toFixed(2)}%)`;
  chEl.className=`val ${dc>=0?'pos':'neg'}`;
  const zEl=document.getElementById('iZ');
  zEl.textContent=`${lastZ.z>=0?'+':''}${lastZ.z.toFixed(2)}σ`;
  zEl.className=`val ${lastZ.z>0.5?'pos':lastZ.z<-0.5?'neg':'neu'}`;
  document.getElementById('iRatio').textContent=lastZ.ratio.toFixed(4);
  document.getElementById('iRange').textContent=`${zData[0].date.slice(0,7)} ~ ${lastZ.date.slice(0,7)}`;

  // 배너
  const bn=document.getElementById('banner');
  const an=asset==='SLV'?'은':'금', vs=asset==='SLV'?'금':'은';
  if (lastZ.z>2)       {bn.className='banner over';  bn.textContent=`▲ 현재 ${an}은 ${vs} 대비 역사적 고평가 구간 (+${lastZ.z.toFixed(2)}σ)`;}
  else if (lastZ.z<-2) {bn.className='banner under'; bn.textContent=`▼ 현재 ${an}은 ${vs} 대비 역사적 저평가 구간 (${lastZ.z.toFixed(2)}σ)`;}
  else                 {bn.className='banner mid';   bn.textContent=`현재 ${an}은 ${vs} 대비 중립 구간 (${lastZ.z>=0?'+':''}${lastZ.z.toFixed(2)}σ)`;}

  // 타이틀
  const wLbl=win===252?'1년(52주)':win===504?'2년':'5년';
  document.getElementById('priceDot').className=`dot ${asset==='SLV'?'silver':'gold'}`;
  document.getElementById('priceTitle').textContent=asset==='SLV'?'SLV (은) — 가격':'GLD (금) — 가격';
  document.getElementById('zTitle').textContent=`${wLbl} Z-Score · ${vs} 대비 ${an} 밸류에이션 (고평가 / 저평가)`;

  // 다운샘플
  const step=Math.max(1,Math.floor(zData.length/500));
  const pF=pSrc.filter((_,i)=>i%step===0);
  const zF=zData.filter((_,i)=>i%step===0);
  pkLabels=findPeaks(zF);

  // 리셋 후 데이터 교체
  chartP.resetZoom(); chartZ.resetZoom();
  chartP.data.labels=pF.map(d=>d.Date.slice(0,7));
  chartP.data.datasets[0].data=pF.map(d=>d.Close);
  chartP.data.datasets[0].borderColor=asset==='SLV'?'#c0c0c0':'#f59e0b';
  chartP.options.plugins.tooltip.callbacks={title:items=>pF[items[0].dataIndex]?.Date||''};
  chartP.options.scales.y.ticks.callback=v=>`$${v.toFixed(v>=100?0:2)}`;
  chartP.update('none');

  chartZ.data.labels=zF.map(d=>d.date.slice(0,7));
  chartZ.data.datasets[0].data=zF.map(d=>d.z);
  chartZ.data.datasets[0].backgroundColor=zF.map(d=>d.z>=0?'rgba(249,115,22,.5)':'rgba(45,212,191,.5)');
  chartZ.data.datasets[0].borderColor=zF.map(d=>d.z>=0?'rgba(249,115,22,.9)':'rgba(45,212,191,.9)');
  chartZ.options.plugins.tooltip.callbacks={title:items=>zF[items[0].dataIndex]?.date||''};
  chartZ.update('none');
}

// ── 공유 & 버튼 플래시
function flashBtn(id, cls, ms=1200) {
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls), ms);
}
function openURL(u){try{const a=document.createElement('a');a.href=u;a.target='_top';document.body.appendChild(a);a.click();document.body.removeChild(a);}catch(e){}}
function copyText(t){
  try{window.parent.postMessage({type:'clipboard',text:t},'*');}catch(e){}
  try{if(navigator.clipboard)navigator.clipboard.writeText(t);}catch(e){}
  try{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}catch(e){}
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function doShare(p){
  const txt=`${asset==='SLV'?'은(SLV)':'금(GLD)'} 밸류에이션 — 금 & 은 밸류미터 | HerdVibe`;
  if(p==='tw') openURL(`https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(SHARE_URL)}`);
  else if(p==='kk') openURL(`https://story.kakao.com/share?url=${encodeURIComponent(SHARE_URL)}`);
  else if(p==='tg') openURL(`https://t.me/share/url?url=${encodeURIComponent(SHARE_URL)}&text=${encodeURIComponent(txt)}`);
  else if(p==='ig'){copyText(SHARE_URL);flashBtn('btnIg','flash-red');showToast('링크 복사됨 — 인스타그램에 붙여넣기 하세요');}
  else if(p==='cp'){copyText(SHARE_URL);flashBtn('btnCp','flash-green');showToast('링크가 복사되었습니다');}
}

// ── 이벤트
document.querySelectorAll('[data-asset]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-asset]').forEach(x=>x.className='btn');
  asset=b.dataset.asset;
  b.className=`btn on-${asset==='SLV'?'silver':'gold'}`;
  if(SLV.length) update();
}));
document.querySelectorAll('[data-w]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-w]').forEach(x=>x.className='btn');
  b.className='btn on-cyan';
  win=+b.dataset.w;
  if(SLV.length) update();
}));

initCharts();
const BASE = '';  // 같은 레포 내 상대경로 (필요시 절대경로로 변경: 'https://kittycapital.github.io/etf-seasonality/')
Promise.all([loadCSV(BASE+'data/SLV.csv'), loadCSV(BASE+'data/GLD.csv')]).then(([s,g])=>{
  SLV=s; GLD=g;
  console.log(`[INIT] SLV=${SLV.length}행, GLD=${GLD.length}행`);
  if (!SLV.length || !GLD.length) {
    document.getElementById('updated').textContent='CSV 로드 실패 — 콘솔 확인';
    console.error('[INIT] CSV 데이터가 비어있습니다. 헤더를 확인하세요.');
    return;
  }
  document.getElementById('updated').textContent=`Last updated: ${SLV[SLV.length-1].Date}`;
  update();
}).catch(e=>{
  document.getElementById('updated').textContent='Data load error — 콘솔 확인';
  console.error('[INIT] CSV 로드 에러:', e);
});
